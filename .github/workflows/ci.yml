name: CI
on: [push, pull_request]

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - name: Validate examples against schema
        run: |
          python -c "
          import yaml, json, sys, glob
          from jsonschema import Draft202012Validator

          with open('schema.json') as f:
              schema = json.load(f)

          validator = Draft202012Validator(schema)
          failed = False
          for path in sorted(glob.glob('examples/*.cr3st4n1')):
              with open(path) as f:
                  data = yaml.safe_load(f)
              errors = list(validator.iter_errors(data))
              if errors:
                  failed = True
                  print(f'FAIL: {path}')
                  for e in errors:
                      print(f'  {e.message} at /{"/".join(str(p) for p in e.absolute_path)}')
              else:
                  print(f'PASS: {path}')

          if failed:
              sys.exit(1)
          print('All examples valid.')
          "

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all
      - run: cargo clippy --all -- -D warnings
      - run: cargo fmt --all -- --check

  cross-lang:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pynacl pyyaml
      - name: Cross-language sign and verify
        run: |
          cargo run -- key generate --output /tmp/key.json
          cp examples/minimal.cr3st4n1 /tmp/signed.cr3st4n1
          cargo run -- credential sign --input /tmp/signed.cr3st4n1 --key /tmp/key.json
          PUBKEY=$(python -c "import json; print(json.load(open('/tmp/key.json'))['public'])")
          python examples/verify.py /tmp/signed.cr3st4n1 "$PUBKEY"
